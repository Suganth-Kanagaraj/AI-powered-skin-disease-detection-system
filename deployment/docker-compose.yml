version: '3.8'
services:
  backend:
    build: ./backend
    ports:
      - '8000:8000'
    env_file:
      - ./backend/.env.example
    volumes:
      - ./backend/app:/app/app

  frontend:
    build: ./frontend
    ports:
      - '5173:5173'

  db:
    image: postgres:15
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: ai_skin
    ports:
      - '5432:5432'

  mongo:
    image: mongo:6
    ports:
      - '27017:27017'
